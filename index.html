<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Downloader</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="container">
      <h1>🎬 YouTube Downloader</h1>
      <p>Download your favorite YouTube videos in the quality you want</p>

      <section class="download">
        <form id="download-form">
          <div class="form-group">
            <label for="video-url">YouTube URL:</label>
            <input id="video-url" type="url" placeholder="https://www.youtube.com/watch?v=..." required />
          </div>
          
          <div class="form-group">
            <label for="quality-select">Quality:</label>
            <select id="quality-select">
              <option value="best">Best Available</option>
              <option value="bestvideo">Best Video Only</option>
              <option value="bestaudio">Best Audio Only</option>
            </select>
          </div>
          
          <button type="submit" id="download-btn">Download</button>
        </form>
        
        <div id="status-container" style="display:none; margin-top: 20px;">
          <p id="download-status"></p>
          <progress id="download-progress" value="0" max="100"></progress>
          <button id="cancel-btn">Cancel Download</button>
        </div>
      </section>
    </main>
  </body>
</html>
